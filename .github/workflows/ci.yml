name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # 1. Continuous Integration (CI) - Lint, Typecheck, and Build
  quality:
    name: Continuous Integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Code format check
        run: pnpm format:check

      - name: Code lint
        run: pnpm lint

      - name: TypeScript validation
        run: pnpm typecheck

      - name: Production build compilation
        run: pnpm build

  # 2. Continuous Deployment (CD) - Deploy to EC2
  deploy:
    name: Continuous Deployment
    runs-on: ubuntu-latest
    needs: quality
    # Only run deployment on pushes to main branch
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to EC2 instance via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          SSH_HOST: ${{ secrets.EC2_HOST }}
          SSH_USER: ${{ secrets.EC2_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '~/codemri' }}
          # App secrets
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_GITHUB_ID: ${{ secrets.AUTH_GITHUB_ID }}
          AUTH_GITHUB_SECRET: ${{ secrets.AUTH_GITHUB_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          # Create ssh configuration directory
          mkdir -p ~/.ssh

          # Write the private key, remove any Windows carriage return formatting, and set correct permissions
          printf "%s\n" "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Scan public key for known hosts to prevent man-in-the-middle prompts
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

          # Resolve and expand deployment path on runner to locate target home folder
          DEPLOY_PATH_EXPANDED=$(ssh -i ~/.ssh/id_rsa "$SSH_USER@$SSH_HOST" "eval echo $DEPLOY_PATH")

          # Write secrets file locally on the runner
          cat << EOF > .env.secrets
          AUTH_SECRET=$AUTH_SECRET
          AUTH_GITHUB_ID=$AUTH_GITHUB_ID
          AUTH_GITHUB_SECRET=$AUTH_GITHUB_SECRET
          GITHUB_TOKEN=$GITHUB_TOKEN
          GROQ_API_KEY=$GROQ_API_KEY
          EOF

          # Copy the secrets file to the remote user home directory (failsafe area)
          scp -i ~/.ssh/id_rsa .env.secrets "$SSH_USER@$SSH_HOST:~/.env.secrets"
          rm -f .env.secrets

          # Connect via SSH, pull latest main code, merge secrets, and execute local EC2 run script
          echo "🚀 Connecting to EC2 host: $SSH_HOST..."
          ssh -i ~/.ssh/id_rsa "$SSH_USER@$SSH_HOST" "
            # Load NVM (Node Version Manager) paths
            export NVM_DIR=\"\$HOME/.nvm\"
            [ -s \"\$NVM_DIR/nvm.sh\" ] && \. \"\$NVM_DIR/nvm.sh\"

            # Auto-clone repository if deploy directory does not exist
            if [ ! -d \"$DEPLOY_PATH_EXPANDED\" ]; then
              echo '📂 Target directory does not exist. Auto-cloning repository...'
              git clone https://github.com/arbab-sra/hakton.git \"$DEPLOY_PATH_EXPANDED\"
            fi
            
            # Move the secrets file into the deployment directory
            if [ -f ~/.env.secrets ]; then
              mv ~/.env.secrets \"$DEPLOY_PATH_EXPANDED/.env.secrets\"
            fi

            cd \"$DEPLOY_PATH_EXPANDED\"
            
            # Check if required tools are missing and install them
            if ! command -v pm2 &> /dev/null || ! command -v pnpm &> /dev/null || ! command -v docker &> /dev/null; then
              echo '⚙️ Required tools (pm2, pnpm, or docker) are missing. Running installer...'
              chmod +x install-deps.sh
              ./install-deps.sh
              
              # Re-load NVM paths after installation
              [ -s \"\$NVM_DIR/nvm.sh\" ] && \. \"\$NVM_DIR/nvm.sh\"
            fi

            # Merge secrets into the remote .env file using Node.js
            if [ -f .env.secrets ]; then
              echo '📝 Injecting GitHub Secrets into remote .env file...'
              node -e \"
                const fs = require('fs');
                let content = fs.existsSync('.env') ? fs.readFileSync('.env', 'utf8') : fs.readFileSync('.env.example', 'utf8');
                const secretsContent = fs.readFileSync('.env.secrets', 'utf8');
                const lines = secretsContent.split('\\n');
                for (const line of lines) {
                  if (line.includes('=')) {
                    const idx = line.indexOf('=');
                    const key = line.substring(0, idx).trim();
                    const val = line.substring(idx + 1).trim();
                    if (val) {
                      const regex = new RegExp('^' + key + '=.*', 'm');
                      if (regex.test(content)) {
                        content = content.replace(regex, key + '=' + val);
                      } else {
                        content += '\\n' + key + '=' + val;
                      }
                    }
                  }
                }
                fs.writeFileSync('.env', content, 'utf8');
              \"
              rm -f .env.secrets
            fi

            git fetch origin main && \
            git reset --hard origin/main && \
            chmod +x setup-https.sh && \
            ./setup-https.sh codemri.arbab.fun && \
            ./run-ec2.sh
          "
          echo "🎉 Deployment successful!"
