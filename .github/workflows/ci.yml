name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # 1. Continuous Integration (CI) - Lint, Typecheck, and Build
  quality:
    name: Continuous Integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Code format check
        run: pnpm format:check

      - name: Code lint
        run: pnpm lint

      - name: TypeScript validation
        run: pnpm typecheck

      - name: Production build compilation
        run: pnpm build

  # 2. Continuous Deployment (CD) - Deploy to EC2
  deploy:
    name: Continuous Deployment
    runs-on: ubuntu-latest
    needs: quality
    # Only run deployment on pushes to main branch
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to EC2 instance via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          SSH_HOST: ${{ secrets.EC2_HOST }}
          SSH_USER: ${{ secrets.EC2_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '~/codemri' }}
          # App secrets
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_GITHUB_ID: ${{ secrets.AUTH_GITHUB_ID }}
          AUTH_GITHUB_SECRET: ${{ secrets.AUTH_GITHUB_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          # Create ssh configuration directory
          mkdir -p ~/.ssh

          # Write the private key, remove any Windows carriage return formatting, and set correct permissions
          printf "%s\n" "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Scan public key for known hosts to prevent man-in-the-middle prompts
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

          # Resolve and expand deployment path on runner to locate target home folder
          DEPLOY_PATH_EXPANDED=$(ssh -i ~/.ssh/id_rsa "$SSH_USER@$SSH_HOST" "eval echo $DEPLOY_PATH")

          # Write secrets file locally on the runner
          cat << EOF > .env.secrets
          AUTH_SECRET=$AUTH_SECRET
          AUTH_GITHUB_ID=$AUTH_GITHUB_ID
          AUTH_GITHUB_SECRET=$AUTH_GITHUB_SECRET
          GITHUB_TOKEN=$GITHUB_TOKEN
          GROQ_API_KEY=$GROQ_API_KEY
          EOF

          # Copy secrets file to EC2
          scp -i ~/.ssh/id_rsa .env.secrets "$SSH_USER@$SSH_HOST:~/.env.secrets"
          rm -f .env.secrets

          # Write the merge-env Node.js helper script to a temp file (avoids inline escaping hell)
          cat > /tmp/merge-env.js << 'NODEJS_EOF'
const fs = require('fs');
const path = require('path');
const deployDir = process.argv[2];
const secretsFile = path.join(process.env.HOME, '.env.secrets');
if (!fs.existsSync(secretsFile)) { console.log('No secrets file found, skipping.'); process.exit(0); }
const envFile = path.join(deployDir, '.env');
const exampleFile = path.join(deployDir, '.env.example');
let content = fs.existsSync(envFile) ? fs.readFileSync(envFile, 'utf8') : fs.readFileSync(exampleFile, 'utf8');
const secrets = fs.readFileSync(secretsFile, 'utf8');
for (const line of secrets.split('\n')) {
  const idx = line.indexOf('=');
  if (idx < 1) continue;
  const key = line.substring(0, idx).trim();
  const val = line.substring(idx + 1).trim();
  if (!key || !val) continue;
  const re = new RegExp('^' + key + '=.*', 'm');
  content = re.test(content) ? content.replace(re, key + '=' + val) : content + '\n' + key + '=' + val;
}
fs.writeFileSync(envFile, content, 'utf8');
console.log('Secrets injected into .env successfully.');
NODEJS_EOF

          # Copy helper scripts to EC2
          scp -i ~/.ssh/id_rsa /tmp/merge-env.js "$SSH_USER@$SSH_HOST:~/merge-env.js"

          # Connect via SSH, pull latest main code, merge secrets, and start the app
          echo "🚀 Connecting to EC2 host: $SSH_HOST..."
          ssh -i ~/.ssh/id_rsa "$SSH_USER@$SSH_HOST" "
            export NVM_DIR=\"\$HOME/.nvm\"
            [ -s \"\$NVM_DIR/nvm.sh\" ] && \. \"\$NVM_DIR/nvm.sh\"

            # Auto-clone repository if deploy directory does not exist
            if [ ! -d \"$DEPLOY_PATH_EXPANDED\" ]; then
              echo '📂 Target directory does not exist. Auto-cloning repository...'
              git clone https://github.com/arbab-sra/hakton.git \"$DEPLOY_PATH_EXPANDED\"
            fi

            cd \"$DEPLOY_PATH_EXPANDED\"

            # Check if required tools are missing and install them
            if ! command -v pm2 &> /dev/null || ! command -v pnpm &> /dev/null || ! command -v docker &> /dev/null; then
              echo '⚙️ Required tools missing. Running installer...'
              chmod +x install-deps.sh && ./install-deps.sh
              [ -s \"\$NVM_DIR/nvm.sh\" ] && \. \"\$NVM_DIR/nvm.sh\"
            fi

            # Pre-deploy disk cleanup to prevent 'no space left on device'
            echo '🧹 Cleaning disk before deploy...'
            rm -rf node_modules .next 2>/dev/null || true
            docker system prune -f 2>/dev/null || true
            sudo -n apt-get clean 2>/dev/null || true
            df -h /

            # Pull latest code
            git fetch origin main && git reset --hard origin/main

            # Inject secrets into .env AFTER git reset (avoids being wiped)
            if [ -f ~/.env.secrets ] && command -v node &>/dev/null; then
              echo '📝 Injecting GitHub Secrets into .env...'
              node ~/merge-env.js \"$DEPLOY_PATH_EXPANDED\"
              rm -f ~/.env.secrets ~/merge-env.js
            fi

            chmod +x setup-https.sh && ./setup-https.sh codemri.arbab.fun
            ./run-ec2.sh
          "
          echo "🎉 Deployment successful!"
